---
# PIA WireGuard for Firewalla
# Docs & full config reference: https://github.com/MaximumWorf/firewalla-pia_wg
#
# First-time setup:
#   1. Start container:  docker compose up -d
#   2. Open web UI at    http://<firewalla-ip>:8080
#      → click "Generate Config for App" → paste into Firewalla app:
#        VPN Client → Add VPN → WireGuard → paste → Save
#   3. Find profile ID: ls -t ~/.firewalla/run/wg_profile/*.conf | head -1
#      → set FIREWALLA_PROFILE_ID below (or via the web UI Settings tab)
#      → docker compose up -d   (to pick up the new env var)
#
#   Or without the web UI (SSH):
#   docker compose exec pia-wg /app/pia-wg-firewalla.sh generate-config
#
# Update image:    docker compose pull && docker compose up -d
# View logs:       docker compose logs -f  (or open web UI → Logs tab)
# Force reconnect: docker compose exec pia-wg /app/pia-wg-firewalla.sh reconnect
version: "3.9"

services:
  pia-wg:
    image: ghcr.io/maximumworf/firewalla-pia_wg:latest
    container_name: pia-wg
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - pia-wg-data:/data/pia-wg
      - /home/pi/.firewalla/run/wg_profile:/home/pi/.firewalla/run/wg_profile
      - /media/home-rw/overlay/pi/.firewalla/run/wg_profile:/media/home-rw/overlay/pi/.firewalla/run/wg_profile
    environment:
      PIA_USER: ""
      PIA_PASS: ""

      # Dedicated IP — leave blank for a standard shared-IP account
      DIP_TOKEN: ""
      DIP_HOSTNAME: ""
      DIP_SERVER_IP: ""
      DIP_PORT: "1337"

      # Region — ignored when DIP_TOKEN is set
      PIA_REGION: "us_east"

      # ── Firewalla app integration (recommended) ────────────────────────────
      # Run 'generate-config', paste into Firewalla app, then set the profile
      # ID here (filename without .conf from ~/.firewalla/run/wg_profile/).
      FIREWALLA_PROFILE_ID: ""
      WG_MANAGED_BY_FIREWALLA: "true"

      # Legacy: only used when FIREWALLA_PROFILE_ID is blank (creates profile
      # files externally instead of updating an app-created profile).
      PROFILE_NAME: "PIA_WG"

      # Leave blank to use PIA's DNS (recommended). Override: "1.1.1.1,1.0.0.1"
      WG_DNS_OVERRIDE: ""

      WATCHDOG_INTERVAL: "60"
      HANDSHAKE_MAX_AGE: "120"
      MAX_DOWN_TIME: "300"
      MAX_RECONNECT_ATTEMPTS: "5"
      VPN_CHECK_IP: "9.9.9.9"
      DATA_DIR: "/data/pia-wg"

      # ── Web UI ─────────────────────────────────────────────────────────────
      # Browser dashboard: http://<firewalla-ip>:8080
      # Set to "0" to disable the web UI entirely.
      WEB_PORT: "8080"

    healthcheck:
      test: ["CMD", "sh", "-c", "wg show 2>/dev/null | grep -q interface || true"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pia-wg-data:
