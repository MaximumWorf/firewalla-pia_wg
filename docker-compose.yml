---
# =============================================================================
# PIA WireGuard for Firewalla — Docker Compose
#
# No-clone quick start (pulls pre-built image automatically):
#
#   mkdir pia-wg && cd pia-wg
#   curl -fsSL https://raw.githubusercontent.com/MaximumWorf/firewalla-pia_wg/main/docker-compose.yml -o docker-compose.yml
#   curl -fsSL https://raw.githubusercontent.com/MaximumWorf/firewalla-pia_wg/main/.env.example -o .env
#   # Edit .env — set PIA_USER and PIA_PASS (and optionally DIP_TOKEN)
#   nano .env
#   docker compose up -d
#
# View logs:       docker compose logs -f
# Force reconnect: docker compose exec pia-wg /app/pia-wg-firewalla.sh reconnect
# Show status:     docker compose exec pia-wg /app/pia-wg-firewalla.sh status
# List regions:    docker compose exec pia-wg /app/pia-wg-firewalla.sh list-regions
# =============================================================================
version: "3.9"

services:
  pia-wg:
    # Pre-built multi-arch image (amd64 / arm64 / armv7) — no repo clone needed.
    # To build locally instead, comment this line and uncomment `build: .` below.
    image: ghcr.io/maximumworf/firewalla-pia_wg:latest
    # build: .
    container_name: pia-wg
    restart: unless-stopped

    # Host networking exposes the WireGuard interface to the host OS.
    # Required so the tunnel is visible to Firewalla's routing engine.
    network_mode: host

    cap_add:
      - NET_ADMIN
      - SYS_MODULE     # load wireguard kernel module

    devices:
      - /dev/net/tun:/dev/net/tun

    volumes:
      # Persistent state: WireGuard keypair, PIA token cache, server list, configs.
      # Keys and token survive container restarts — no re-registration on every start.
      - pia-wg-data:/data/pia-wg

      # Optional: also write Firewalla profile files so the VPN appears in the
      # Firewalla app under VPN Client → WireGuard. Uncomment both lines below
      # and set WG_MANAGED_BY_FIREWALLA=true in your .env.
      # - /home/pi/.firewalla/run/wg_profile:/home/pi/.firewalla/run/wg_profile
      # - /media/home-rw/overlay/pi/.firewalla/run/wg_profile:/media/home-rw/overlay/pi/.firewalla/run/wg_profile

    env_file:
      - .env

    environment:
      # Docker manages the WireGuard interface directly via wg-quick.
      # Change to "true" only if you also uncomment the Firewalla volume mounts above.
      WG_MANAGED_BY_FIREWALLA: "false"

    healthcheck:
      test: ["CMD", "sh", "-c", "ip link show $${PROFILE_NAME:-PIA_WG} | grep -q UP"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1   # required by wg-quick
      - net.ipv6.conf.all.disable_ipv6=0

volumes:
  pia-wg-data:
