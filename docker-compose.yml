---
# PIA WireGuard for Firewalla
# Docs & full config reference: https://github.com/MaximumWorf/firewalla-pia_wg
#
# Update image:    docker compose pull && docker compose up -d
# View logs:       docker compose logs -f
# Force reconnect: docker compose exec pia-wg /app/pia-wg-firewalla.sh reconnect
# Show status:     docker compose exec pia-wg /app/pia-wg-firewalla.sh status
version: "3.9"

services:
  pia-wg:
    image: ghcr.io/maximumworf/firewalla-pia_wg:latest
    container_name: pia-wg
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - pia-wg-data:/data/pia-wg
      - /home/pi/.firewalla/run/wg_profile:/home/pi/.firewalla/run/wg_profile
      - /media/home-rw/overlay/pi/.firewalla/run/wg_profile:/media/home-rw/overlay/pi/.firewalla/run/wg_profile
    environment:
      PIA_USER: ""
      PIA_PASS: ""

      # Dedicated IP — leave DIP_TOKEN blank for a standard shared-IP account
      DIP_TOKEN: ""
      # Manual server override — only needed if the automatic API lookup fails.
      # The script resolves these automatically from DIP_TOKEN; set manually as a last resort.
      DIP_HOSTNAME: ""
      DIP_SERVER_IP: ""
      DIP_PORT: "1337"

      # Region — ignored when DIP_TOKEN is set
      # Run list-regions command above for available IDs
      PIA_REGION: "us_east"

      # Display name in Firewalla app and WireGuard interface name (max 15 chars)
      PROFILE_NAME: "PIA_WG"

      # true  = Firewalla app manages the interface (enable once in app after first run)
      # false = container manages WireGuard directly via wg-quick
      WG_MANAGED_BY_FIREWALLA: "true"

      # Leave blank to use PIA's DNS (recommended). Override: "1.1.1.1,1.0.0.1"
      WG_DNS_OVERRIDE: ""

      WATCHDOG_INTERVAL: "60"
      HANDSHAKE_MAX_AGE: "120"
      MAX_DOWN_TIME: "300"
      MAX_RECONNECT_ATTEMPTS: "5"
      VPN_CHECK_IP: "9.9.9.9"
      DATA_DIR: "/data/pia-wg"

    healthcheck:
      test: ["CMD", "sh", "-c", "ip link show $${PROFILE_NAME:-PIA_WG} | grep -q UP"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pia-wg-data:
